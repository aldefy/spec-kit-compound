schema_version: "1.0"

extension:
  id: compound
  name: "Spec-Kit Compound"
  version: "0.2.1"
  description: "Intent-driven scoping (ICE), compound engineering memory, and L3 intent guard validation for SpecKit's SDD workflow."
  author: Adit Lal
  repository: https://github.com/aldefy/spec-kit-compound
  homepage: https://github.com/aldefy/spec-kit-compound
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.compound.intent
      file: commands/speckit.compound.intent.md
      description: "Interview-driven intent capture: goal, constraints, failure conditions. Refuses to terminate until G1-G5, C1-C5, F1-F4 all pass. Suggests /speckit-compound-expectations on completion."

    - name: speckit.compound.expectations
      file: commands/speckit.compound.expectations.md
      description: "Compartmented success and edge scenarios for the validator (not the builder). E1-E4 rubric. Reward-hack defense via file separation."

    - name: speckit.compound.load
      file: commands/speckit.compound.load.md
      description: "Load ADRs, corrections, and patterns from docs/compound/ into agent context at the start of a feature. Auto-scaffolds the directory if missing."

    - name: speckit.compound.writeback
      file: commands/speckit.compound.writeback.md
      description: "Persist new ADRs, corrections, and patterns from the just-completed feature back to the compound store. Requires intent guard PASS."

    - name: speckit.compound.gapfill
      file: commands/speckit.compound.gapfill.md
      description: "Cross-references intent + expectations against tasks.md; appends missing constraint-violation, failure-condition, OOS-regression, and edge tests."

    - name: speckit.compound.intentguard
      file: commands/speckit.compound.intentguard.md
      description: "L3 validation: diff vs intent's OOS, constraints, failure conditions, and expectations scenarios. Returns PASS / REVIEW NEEDED / BLOCKED. Suggests /speckit-compound-writeback on PASS."

# Note: no `hooks:` block as of v0.2.1.
#
# v0.2.0 registered four before_*/after_* hooks pointing at our agent-prompt
# commands. They installed cleanly into the merged .specify/extensions.yml,
# but spec-kit's hook executor under Claude Code does not dispatch slash-
# command hooks (only shell-script hooks like the bundled git extension's).
# The hooks silently no-op'd, so /speckit-specify generated vanilla specs
# without ever invoking /speckit-compound-intent.
#
# Until upstream support for agent-prompt hook dispatch lands, users type
# the chain manually (see README cheat sheet) and verify with
# scripts/check-chain-fired.sh after the run.
#
# v0.2.2 may introduce a single shell-script gate hook that blocks
# /speckit-specify if no intent doc exists — this would use the same
# pattern git's hooks use (which DO fire) but for gating rather than
# chaining.

tags:
  - intent-driven
  - compound-engineering
  - validation
  - memory
  - idsd
  - ice
  - adr
