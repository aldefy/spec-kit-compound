schema_version: "1.0"

extension:
  id: compound
  name: "Spec-Kit Compound"
  version: "0.3.1"
  description: "Intent-driven scoping (ICE), compound engineering memory with active enforcement, and L3 intent guard validation for SpecKit's SDD workflow."
  author: Adit Lal
  repository: https://github.com/aldefy/spec-kit-compound
  homepage: https://github.com/aldefy/spec-kit-compound
  license: MIT

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.compound.intent
      file: commands/speckit.compound.intent.md
      description: "Interview-driven intent capture: goal, constraints, failure conditions. Refuses to terminate until G1-G5, C1-C5, F1-F4 all pass. Hands off to /speckit-compound-expectations on completion."

    - name: speckit.compound.expectations
      file: commands/speckit.compound.expectations.md
      description: "Compartmented success and edge scenarios for the validator (not the builder). E1-E4 rubric. Reward-hack defense via file separation."

    - name: speckit.compound.load
      file: commands/speckit.compound.load.md
      description: "Load ADRs, corrections, and patterns from docs/compound/ into agent context at the start of a feature. Auto-scaffolds the directory if missing."

    - name: speckit.compound.writeback
      file: commands/speckit.compound.writeback.md
      description: "Persist new ADRs, corrections, and patterns from the just-completed feature back to the compound store. Requires intent guard PASS."

    - name: speckit.compound.gapfill
      file: commands/speckit.compound.gapfill.md
      description: "Cross-references intent + expectations against tasks.md; appends missing constraint-violation, failure-condition, OOS-regression, and edge tests."

    - name: speckit.compound.intentguard
      file: commands/speckit.compound.intentguard.md
      description: "L3 validation: diff vs intent's OOS, constraints, failure conditions, and expectations scenarios. Returns PASS / REVIEW NEEDED / BLOCKED."

    - name: speckit.compound.require-intent
      file: commands/speckit.compound.require-intent.md
      description: "Gate hook (shell-script wrapper, v0.2.2+): blocks /speckit-specify if no intent doc exists. Forces /speckit-compound-intent to be run first."

    - name: speckit.compound.install-hooks
      file: commands/speckit.compound.install-hooks.md
      description: "One-shot installer (shell-script wrapper, v0.3+): copies the active-corrections PreToolUse hook script into .claude/hooks/ and merges the registration into .claude/settings.json with a pragmatic merge that preserves all other entries."

# v0.2.2: spec-kit before_specify gate.
# v0.3.0: no new spec-kit hooks added — active-corrections runs via Claude Code's
# PreToolUse, which is installed at user opt-in via /speckit-compound-install-hooks
# (a separate enforcement layer at the tool level, complementary to the spec-kit
# phase-level gate below).
hooks:
  before_specify:
    command: speckit.compound.require-intent
    optional: false
    description: "Block /speckit-specify if docs/intents/ is empty; tells user to run /speckit-compound-intent first"

tags:
  - intent-driven
  - compound-engineering
  - validation
  - memory
  - idsd
  - ice
  - adr
  - claude-hooks
