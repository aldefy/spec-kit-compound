schema_version: "1.0"

extension:
  id: "spec-kit-compound"
  name: "Spec-Kit Compound"
  version: "0.1.0"
  description: "Intent-driven scoping (ICE), compound engineering memory, and L3 intent guard validation for the SpecKit SDD workflow."
  author: "Adit Lal"
  repository: "https://github.com/aldefy/spec-kit-compound"
  homepage: "https://github.com/aldefy/spec-kit-compound"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.intent"
      file: "commands/intent.md"
      description: "Interview-driven intent capture: goal, constraints, failure conditions. Refuses to terminate until the intent passes G1-G5, C1-C5, F1-F4 quality tests."

    - name: "speckit.expectations"
      file: "commands/expectations.md"
      description: "Compartmented success and edge scenarios for the validator (not the builder). Soft compartmentation against reward-hacking; E1-E4 rubric."

    - name: "speckit.compound"
      file: "commands/compound.md"
      description: "Load and writeback subactions for the committed compound store (ADRs, corrections, patterns). The memory layer that survives across sessions, machines, and teammates."

    - name: "speckit.gapfill"
      file: "commands/gapfill.md"
      description: "Cross-references intent + expectations against the SpecKit-generated tasks.md; appends missing constraint, failure, and edge tests with source comments."

    - name: "speckit.intentguard"
      file: "commands/intentguard.md"
      description: "L3 validation: git diff vs intent out-of-scope, constraints, failure conditions, and expectations. Returns PASS / REVIEW NEEDED / BLOCKED."

tags:
  - "intent-driven"
  - "compound-engineering"
  - "validation"
  - "memory"
  - "idsd"
  - "ice"
  - "adr"
